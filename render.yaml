# Optional Render Blueprint — NOT used by Railway (deploy API on Railway per DEPLOY.md).
# https://render.com/docs/blueprint-spec

services:
  # Django API
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    # No migrate during build — DB often unreachable in build env; migrate runs at start.
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && python manage.py ensure_superuser && gunicorn portfolio_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Matches any *.onrender.com host; override if you use a custom domain.
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio
