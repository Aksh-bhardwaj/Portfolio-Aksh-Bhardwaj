# Render Blueprint — https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → Connect repo (optional; you can also create services manually)

services:
  # Django API
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    # No migrate during build — DB often unreachable in build env; migrate runs at start.
    buildCommand: pip install -r requirements-render.txt
    startCommand: python manage.py migrate --noinput && gunicorn portfolio_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio
